components:
  parameters:
    filter:
      name: "filter"
      in: "query"
      description: "Text search filter across multiple fields"
      schema:
        type: "string"
    limit:
      name: "limit"
      in: "query"
      description: "Maximum number of results to return"
      schema:
        type: "integer"
        minimum: 1
        maximum: 1000
        default: 20
    offset:
      name: "offset"
      in: "query"
      description: "Number of results to skip"
      schema:
        type: "integer"
        minimum: 0
        default: 0
    taxids:
      name: "taxids"
      in: "query"
      description: "Comma-separated list of taxonomy IDs"
      schema:
        type: "string"
      example: "9606,10090,7227"
    bioproject_accessions:
      name: "bioproject_accessions"
      in: "query"
      description: "Comma-separated list of BioProject accessions"
      schema:
        type: "string"
      example: "PRJNA123456,PRJNA123457"
    assembly_accessions:
      name: "assembly_accessions"
      in: "query"
      description: "Comma-separated list of assembly accessions"
      schema:
        type: "string"
      example: "GCA_000001405.29,GCF_000001405.40"
    db_sources:
      name: "db_sources"
      in: "query"
      description: "Comma-separated list of source databases (RefSeq, Ensembl, GenBank, CommunityRegistry)"
      schema:
        type: "string"
    feature_sources:
      name: "feature_sources"
      in: "query"
      description: "Comma-separated list of GFF feature sources (column 2)"
      schema:
        type: "string"
    biotypes:
      name: "biotypes"
      in: "query"
      description: "Comma-separated list of feature biotypes"
      schema:
        type: "string"
    feature_types:
      name: "feature_types"
      in: "query"
      description: "Comma-separated list of GFF feature types (column 3)"
      schema:
        type: "string"
    pipelines:
      name: "pipelines"
      in: "query"
      description: "Comma-separated list of annotation pipeline names"
      schema:
        type: "string"
    providers:
      name: "providers"
      in: "query"
      description: "Comma-separated list of annotation providers"
      schema:
        type: "string"
    md5_checksums:
      name: "md5_checksums"
      in: "query"
      description: "Comma-separated list of annotation MD5 checksums"
      schema:
        type: "string"
    has_stats:
      name: "has_stats"
      in: "query"
      description: "Filter annotations that have computed statistics"
      schema:
        type: "boolean"
    latest_release_by:
      name: "latest_release_by"
      in: "query"
      description: "Return only the latest release per group"
      schema:
        type: "string"
        enum: ["organism", "assembly"]
    refseq_categories:
      name: "refseq_categories"
      in: "query"
      description: "Comma-separated list of RefSeq categories"
      schema:
        type: "string"
    assembly_levels:
      name: "assembly_levels"
      in: "query"
      description: "Comma-separated list of assembly levels"
      schema:
        type: "string"
    assembly_statuses:
      name: "assembly_statuses"
      in: "query"
      description: "Comma-separated list of assembly statuses"
      schema:
        type: "string"
    assembly_types:
      name: "assembly_types"
      in: "query"
      description: "Comma-separated list of assembly types"
      schema:
        type: "string"
    submitters:
      name: "submitters"
      in: "query"
      description: "Comma-separated list of assembly submitter names"
      schema:
        type: "string"
    release_date_from:
      name: "release_date_from"
      in: "query"
      description: "Filter annotations released on or after this ISO date"
      schema:
        type: "string"
        format: "date"
    release_date_to:
      name: "release_date_to"
      in: "query"
      description: "Filter annotations released on or before this ISO date"
      schema:
        type: "string"
        format: "date"
    sort_by:
      name: "sort_by"
      in: "query"
      description: "Field to sort results by"
      schema:
        type: "string"
    sort_order:
      name: "sort_order"
      in: "query"
      description: "Sort order"
      schema:
        type: "string"
        enum: ["asc", "desc"]
    fields:
      name: "fields"
      in: "query"
      description: "Comma-separated list of dot-notation fields to include in the response"
      schema:
        type: "string"
    selected_fields:
      name: "selected_fields"
      in: "query"
      description: "Comma-separated list of extended TSV column keys to append after the default export columns. Only applies to /annotations/report. Omit to keep the production default column set."
      schema:
        type: "string"
        example: "release_date,taxon_lineage,busco_complete"
    rank:
      name: "rank"
      in: "query"
      description: "Filter taxonomy nodes by rank"
      schema:
        type: "string"

  responses:
    BadRequest:
      description: "Bad request"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: "Forbidden"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
